<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us — Al Mizan Law Firm</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/pages.css"/>
</head>
<body>
<div class="page-wrap">
  <div class="page-hero">
    <div class="page-hero-content">
      <div class="breadcrumb"><a href="index.html" data-i18n="bc_home">Home</a><span class="breadcrumb-sep">›</span><span data-i18n="bc_contact">Contact</span></div>
      <h1 class="page-hero-title" data-i18n="contact_hero_title">Contact Us</h1>
      <p class="page-hero-sub" data-i18n="contact_hero_sub">We are here to help. Reach out and we will respond promptly.</p>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <div class="contact-layout">
        <div>
          <div class="appt-block">
            <h3 class="appt-block-title" data-i18n="contact_form_title">Send Us a Message</h3>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label" data-i18n="lbl_fullname">Full Name *</label>
                <input type="text" id="ctName" class="form-control" data-i18n-placeholder="ph_name" placeholder="Ahmed Mohamed"/>
              </div>
              <div class="form-group">
                <label class="form-label" data-i18n="lbl_phone">Phone</label>
                <input type="tel" id="ctPhone" class="form-control" data-i18n-placeholder="ph_phone" placeholder="+20 100 000 0000"/>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="lbl_email">Email Address *</label>
              <input type="email" id="ctEmail" class="form-control" data-i18n-placeholder="ph_email" placeholder="you@example.com"/>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="lbl_subject">Subject *</label>
              <input type="text" id="ctSubject" class="form-control" data-i18n-placeholder="ph_subject" placeholder="How can we help?"/>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="lbl_message">Message *</label>
              <textarea id="ctMessage" class="form-control" rows="5" data-i18n-placeholder="ph_message" placeholder="Describe your legal matter…"></textarea>
            </div>
            <div id="contactAlert"></div>
            <button class="btn btn-gold" id="ctSubmit" data-i18n="ct_submit">Send Message</button>
          </div>
        </div>
        <aside class="contact-info">
          <div class="appt-block">
            <h3 class="appt-block-title" data-i18n="contact_info_title">Get In Touch</h3>
            <div class="footer-contact-item"><span class="footer-contact-icon">📞</span><div><strong style="color:var(--text);display:block;margin-bottom:3px;" data-i18n="contact_ph_lbl">Phone</strong><span id="ciPhone"></span></div></div>
            <div class="footer-contact-item"><span class="footer-contact-icon">✉</span><div><strong style="color:var(--text);display:block;margin-bottom:3px;" data-i18n="contact_em_lbl">Email</strong><span id="ciEmail"></span></div></div>
            <div class="footer-contact-item"><span class="footer-contact-icon">📍</span><div><strong style="color:var(--text);display:block;margin-bottom:3px;" data-i18n="contact_ad_lbl">Address</strong><span id="ciAddr"></span></div></div>
          </div>
          <div class="appt-block">
            <h3 class="appt-block-title" data-i18n="hours_title">Office Hours</h3>
            <div class="sidebar-detail-item"><span data-i18n="hours_row1_lbl">Sunday – Thursday</span><strong data-i18n="hours_row1_val">9:00 AM – 5:00 PM</strong></div>
            <div class="sidebar-detail-item"><span data-i18n="hours_row2_lbl">Friday – Saturday</span><strong data-i18n="hours_row2_val">Closed</strong></div>
          </div>
          <a href="appointments.html" class="btn btn-red" style="width:100%;justify-content:center;" data-i18n="contact_appt_btn">📅 Book an Appointment</a>
        </aside>
      </div>
    </div>
  </section>
</div>
<script src="js/config.js"></script>
<script src="js/main.js"></script>
<script src="js/i18n.js"></script>
<script src="js/contact.js"></script>
</body>
</html>
